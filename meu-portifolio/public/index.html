<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Observe o uso de % public_url % nas tags acima.
      Ele será substituído pela URL da pasta `pública 'durante a construção.
      Somente arquivos dentro da pasta `public 'podem ser referenciados no HTML.

      Ao contrário de "/favicon.ico" ou "favicon.ico", "%public_url%/favicon.ico"
      Trabalhe corretamente tanto com o roteamento do lado do cliente quanto um URL público sem raios.
      Aprenda a configurar um URL público sem raios, executando `npm Run Build`.
    -->
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    -->
  </body>
</html>
